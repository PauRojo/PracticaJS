<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Travel Dashboard</title>
  <link rel="stylesheet" href="indexJS.css" />
  </head>
<body>



  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
 
  <div class="container">
 
    <!-- HEADER -->
    <header class="header">
      <div class="header-logo">
        <span class="logo-icon">✈</span>
        <span class="logo-text">TravelBoard</span>
      </div>
      <p class="header-sub">Consulta tot el que necessites abans de viatjar</p>
    </header>


    <section class="selector-section">
      <label for="citySelect" class="selector-label">Selecciona la teva destinació</label>
      <div class="select-wrapper">
        <select id="citySelect">
          <option value="">— Escull una ciutat —</option>
        </select>
        <span class="select-arrow">▾</span>
      </div>
    </section>
 
<main id="dashboardContent" class="dashboard hidden">
 
      <!-- CARD RESUM PRINCIPAL -->
      <div class="card card-hero" id="heroCard">
        <div class="hero-top">
          <div>
            <h2 class="city-name" id="heroCity">—</h2>
            <p class="country-name" id="heroCountry">—</p>
          </div>
          <div class="hero-temp-block">
            <span class="hero-temp" id="heroTemp">—</span>
            <span class="hero-unit">°C</span>
          </div>
        </div>
        <div class="hero-bottom">
          <div class="hero-meta">
            <span class="meta-icon">💱</span>
            <span>Moneda local: <strong id="heroCurrency">—</strong></span>
          </div>
          <div class="hero-meta">
            <span class="meta-icon">🌍</span>
            <span id="heroCoords">—</span>
          </div>
        </div>
      </div>
